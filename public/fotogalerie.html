  <title>Fotogalerie — Pila Zalíbené</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231A0C04'/><circle cx='16' cy='16' r='12' fill='none' stroke='%23C8943A' stroke-width='1.5' opacity='.6'/><circle cx='16' cy='16' r='9' fill='none' stroke='%23C8943A' stroke-width='1' opacity='.45'/><circle cx='16' cy='16' r='6' fill='none' stroke='%23C8943A' stroke-width='.8' opacity='.35'/><circle cx='16' cy='16' r='3.5' fill='none' stroke='%23C8943A' stroke-width='.6' opacity='.3'/><circle cx='16' cy='16' r='1.5' fill='%23C8943A' opacity='.7'/></svg>"/>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#F0E6CC; color:#1A0C04; min-height:100vh; }
    .display { font-family:'Bebas Neue',sans-serif; letter-spacing:0.02em; }

<body>
  <div style="max-width:900px; margin:0 auto; padding:60px 24px; text-align:center;">
    <a href="/" style="display:inline-block; margin-bottom:40px; text-decoration:none; color:#C8943A; font-size:14px; font-weight:600;">← Zpět na hlavní stránku</a>
    <h1 class="display" style="font-size:clamp(3rem,8vw,6rem); line-height:0.9; margin-bottom:16px;">FOTOGALERIE</h1>
    <p style="font-size:1.1rem; color:rgba(26,12,4,0.65); margin-bottom:60px;">Připravujeme pro vás fotky z naší pily a ukázky hotového řeziva.</p>
    <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:16px;">
      <div style="aspect-ratio:4/3; border-radius:16px; background:rgba(200,148,58,0.08); border:1px dashed rgba(200,148,58,0.3); display:flex; align-items:center; justify-content:center; color:rgba(26,12,4,0.3); font-size:14px;">Foto 1</div>
      <div style="aspect-ratio:4/3; border-radius:16px; background:rgba(200,148,58,0.08); border:1px dashed rgba(200,148,58,0.3); display:flex; align-items:center; justify-content:center; color:rgba(26,12,4,0.3); font-size:14px;">Foto 2</div>
      <div style="aspect-ratio:4/3; border-radius:16px; background:rgba(200,148,58,0.08); border:1px dashed rgba(200,148,58,0.3); display:flex; align-items:center; justify-content:center; color:rgba(26,12,4,0.3); font-size:14px;">Foto 3</div>
      <div style="aspect-ratio:4/3; border-radius:16px; background:rgba(200,148,58,0.08); border:1px dashed rgba(200,148,58,0.3); display:flex; align-items:center; justify-content:center; color:rgba(26,12,4,0.3); font-size:14px;">Foto 4</div>
      <div style="aspect-ratio:4/3; border-radius:16px; background:rgba(200,148,58,0.08); border:1px dashed rgba(200,148,58,0.3); display:flex; align-items:center; justify-content:center; color:rgba(26,12,4,0.3); font-size:14px;">Foto 5</div>
      <div style="aspect-ratio:4/3; border-radius:16px; background:rgba(200,148,58,0.08); border:1px dashed rgba(200,148,58,0.3); display:flex; align-items:center; justify-content:center; color:rgba(26,12,4,0.3); font-size:14px;">Foto 6</div>
    </div>
  </div>
</body>
